name: Build and Test

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Tests
        run: mvn clean test

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u 2017subodh2017 --password-stdin

      - name: Build and Push Docker Image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker build \
            -t 2017subodh2017/maven-test-reports-demo:${SHORT_SHA} \
            -t 2017subodh2017/maven-test-reports-demo:latest \
            .
          docker push 2017subodh2017/maven-test-reports-demo:${SHORT_SHA}
          docker push 2017subodh2017/maven-test-reports-demo:latest

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop maven-app || true
            docker rm maven-app || true
            docker pull 2017subodh2017/maven-test-reports-demo:latest
            docker run --rm \
              --name maven-app \
              2017subodh2017/maven-test-reports-demo:latest
            echo "Deployment successful!"

